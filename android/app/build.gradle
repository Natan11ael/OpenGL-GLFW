plugins { id 'com.android.application' }

android {
    namespace "com.example.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.app"
        minSdk 24
        targetSdk 34

        externalNativeBuild {
            cmake { cppFlags "" }
        }
    }

    externalNativeBuild {
        cmake { path "CMakeLists.txt" }
    }

    sourceSets {
        main {
            assets.srcDirs = ['../../src/assets']
        }
    }
}

layout.buildDirectory = file("../../build/android")