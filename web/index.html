<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script type="module">
        const CELL_SIZE  = 0.128;   // célula > 2 * r_max (r_max ≈ 0.007)
        const HASH_SIZE  = 8192;    // tabela de hash — potência de 2
        const BUCKET_CAP = 512;      // máx. partículas por balde

        const attr = 8, objects = 4 ** 5; // 8 atributos (x, y, vx, vy, raio, densidade, massa, temperatura) | 64 objetos
        const arr = new Float32Array(objects * attr);
        for (let i = 0; i < objects; i++) {
            arr[i * attr + 0] = Math.random() * 1 - .5;                    // x  → [-1, 1]
            arr[i * attr + 1] = Math.random() * 1 - .5;                    // y  → [-1, 1]
            arr[i * attr + 2] = 0;                                           // vx → parado
            arr[i * attr + 3] = 0;                                           // vy → parado
            arr[i * attr + 4] = Math.random() * 0.002 + 0.003;               // raio → pequeno
            arr[i * attr + 5] = Math.random() * 10.0 + 0.1;                  // densidade -> pequeno
            arr[i * attr + 6] = arr[i * attr + 4] ** 2 * arr[i * attr + 5];  // massa → area * densidade
            arr[i * attr + 7] = 0;                                           // temperatura -> pequeno
        }
        const len = arr.length;

        try {
            // config
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            const canvas = document.getElementById('canvas');
            const resize = () => { canvas.width = window.innerWidth;canvas.height = window.innerHeight; }; resize();
            window.addEventListener('resize', resize);
            const context = canvas.getContext('webgpu');
            const format = navigator.gpu.getPreferredCanvasFormat();
            context.configure({ device, format });

            const useTS = device.features.has("timestamp-query");
            const qs = useTS ? device.createQuerySet({ type: "timestamp", count: 2 }) : null;
            const qbuf = useTS ? device.createBuffer({
                size: 16,
                usage: GPUBufferUsage.QUERY_RESOLVE | GPUBufferUsage.COPY_SRC
            }) : null;
            const readBuf = useTS ? device.createBuffer({
                size: 16,
                usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
            }) : null;

            const bufferA = device.createBuffer({
                size: arr.byteLength,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.VERTEX
            });

            const bufferB = device.createBuffer({
                size: arr.byteLength,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.VERTEX
            });

            // [count, idx_0 … idx_{BUCKET_CAP-1}] por balde
            const hashBuf = device.createBuffer({
                size: HASH_SIZE * (BUCKET_CAP + 1) * 4,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
            });

            device.queue.writeBuffer(bufferA, 0, arr);

            // ── Shader de inserção: popula o hash com as posições atuais ──────────────
            const insertShader = `
                @group(0) @binding(0) var<storage, read>       particles : array<f32>;
                @group(0) @binding(1) var<storage, read_write> hashTable : array<atomic<u32>>;

                const CELL_SIZE   : f32 = ${CELL_SIZE}f;
                const HASH_MASK   : u32 = ${HASH_SIZE  - 1}u;
                const BUCKET_STR  : u32 = ${BUCKET_CAP + 1}u;
                const BUCKET_CAP_ : u32 = ${BUCKET_CAP}u;
                const A           : u32 = ${attr}u;
                const N           : u32 = ${objects}u;

                fn hashCell(cx: i32, cy: i32) -> u32 {
                    return ((bitcast<u32>(cx) * 2654435761u) ^ (bitcast<u32>(cy) * 805459861u)) & HASH_MASK;
                }

                @compute @workgroup_size(64)
                fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                    if (id.x >= N) { return; }
                    let i  = id.x * A;
                    let cx = i32(floor((particles[i]      + 1.5) / CELL_SIZE));
                    let cy = i32(floor((particles[i + 1u] + 1.5) / CELL_SIZE));
                    let base = hashCell(cx, cy) * BUCKET_STR;
                    let slot = atomicAdd(&hashTable[base], 1u);
                    if (slot < BUCKET_CAP_) {
                        atomicStore(&hashTable[base + 1u + slot], id.x);
                    }
                }
            `;

            // ── Shader de física: O(N·k) via hash ────────────────────────────────────
            const shader = `
                @group(0) @binding(0) var<storage, read>       input     : array<f32>;
                @group(0) @binding(1) var<storage, read_write> output    : array<f32>;
                @group(0) @binding(2) var<storage, read>       hashTable : array<u32>;

                const CELL_SIZE   : f32 = ${CELL_SIZE}f;
                const HASH_MASK   : u32 = ${HASH_SIZE  - 1}u;
                const BUCKET_STR  : u32 = ${BUCKET_CAP + 1}u;
                const BUCKET_CAP_ : u32 = ${BUCKET_CAP}u;
                const A           : u32 = ${attr}u;
                const N           : u32 = ${objects}u;

                fn hashCell(cx: i32, cy: i32) -> u32 {
                    return ((bitcast<u32>(cx) * 2654435761u) ^ (bitcast<u32>(cy) * 805459861u)) & HASH_MASK;
                }

                @compute @workgroup_size(64)
                fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                    if (id.x >= N) { return; }
                    let i = id.x * A;

                    let ax  = input[i];
                    let ay  = input[i + 1u];
                    var avx = input[i + 2u];
                    var avy = input[i + 3u];
                    let ar  = input[i + 4u];
                    let ad  = input[i + 5u];
                    let am  = input[i + 6u];
                    let at  = input[i + 7u];

                    let acx = i32(floor((ax + 1.5) / CELL_SIZE));
                    let acy = i32(floor((ay + 1.5) / CELL_SIZE));

                    // Percorre apenas as 9 células vizinhas
                    for (var cy2 = -1i; cy2 <= 1i; cy2++) {
                        for (var cx2 = -1i; cx2 <= 1i; cx2++) {
                            let base  = hashCell(acx + cx2, acy + cy2) * BUCKET_STR;
                            let count = min(hashTable[base], BUCKET_CAP_);

                            for (var t = 0u; t < count; t++) {
                                let k = hashTable[base + 1u + t];
                                if (k == id.x) { continue; }
                                let j = k * A;

                                let dx      = input[j] - ax;
                                let dy      = input[j + 1u] - ay;
                                let dist_sq = dx * dx + dy * dy;
                                if (dist_sq < 0.000001) { continue; }

                                let dist_inv = inverseSqrt(dist_sq);
                                let dist     = dist_sq * dist_inv;
                                let br       = input[j + 4u];
                                let bm       = input[j + 6u];
                                let range    = ar + br;

                                // Colisão
                                if (dist_sq <= range * range) {
                                    let nx     = dx * dist_inv;
                                    let ny     = dy * dist_inv;
                                    let bvx    = input[j + 2u];
                                    let bvy    = input[j + 3u];
                                    let relVel = (bvx - avx) * nx + (bvy - avy) * ny;
                                    if (relVel < 0.0) {
                                        let restitution = 0.50;
                                        let impulse = -(1.0 + restitution) * relVel / ((1.0 / am) + (1.0 / bm));
                                        avx -= (impulse * nx) / am;
                                        avy -= (impulse * ny) / am;
                                        let penetration = range - dist;
                                        avx -= nx * penetration * 0.02;
                                        avy -= ny * penetration * 0.02;
                                    }
                                }

                                // Gravidade — só fora da zona de colisão (bug corrigido)
                                if (dist_sq > range * range) {
                                    let force = 6.674e-2 * (am * bm) / dist_sq;
                                    avx += force * (dx * dist_inv);
                                    avy += force * (dy * dist_inv);
                                }
                            }
                        }
                    }

                    output[i]      = ax + avx;
                    output[i + 1u] = ay + avy;
                    output[i + 2u] = avx;
                    output[i + 3u] = avy;
                    output[i + 4u] = ar;
                    output[i + 5u] = ad;
                    output[i + 6u] = am;
                    output[i + 7u] = at;
                }
            `;

            // Pipeline de inserção no hash
            const insertModule   = device.createShaderModule({ code: insertShader });
            const insertPipeline = device.createComputePipeline({
                layout: "auto",
                compute: { module: insertModule, entryPoint: "main" }
            });
            const insertBG_A = device.createBindGroup({
                layout: insertPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: bufferA } },
                    { binding: 1, resource: { buffer: hashBuf  } }
                ]
            });
            const insertBG_B = device.createBindGroup({
                layout: insertPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: bufferB } },
                    { binding: 1, resource: { buffer: hashBuf  } }
                ]
            });

            // Pipeline de física (agora com 3 bindings: input, output, hash)
            const computeModule   = device.createShaderModule({ code: shader });
            const computePipeline = device.createComputePipeline({
                layout: "auto",
                compute: { module: computeModule, entryPoint: "main" }
            });
            const bindGroupAB = device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: bufferA } },
                    { binding: 1, resource: { buffer: bufferB } },
                    { binding: 2, resource: { buffer: hashBuf  } }
                ]
            });
            const bindGroupBA = device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: bufferB } },
                    { binding: 1, resource: { buffer: bufferA } },
                    { binding: 2, resource: { buffer: hashBuf  } }
                ]
            });

            const renderShader = `
                struct Particle { x: f32, y: f32, vx: f32, vy: f32, r: f32, d: f32, m: f32, t: f32 };

                @group(0) @binding(0)
                var<storage, read> particles : array<Particle>;

                struct VSOut {
                    @builtin(position) pos : vec4<f32>,
                    @location(0)       uv  : vec2<f32>,  // coordenada local do quad [-1,1]
                    @location(1)       rad : f32,        // raio da partícula
                };

                const corners = array<vec2<f32>, 6>(
                    vec2(-1.0, -1.0), vec2( 1.0, -1.0), vec2(-1.0,  1.0),
                    vec2(-1.0,  1.0), vec2( 1.0, -1.0), vec2( 1.0,  1.0)
                );

                @vertex
                fn vs(@builtin(vertex_index) vi : u32, @builtin(instance_index) pi : u32) -> VSOut {
                    let ci     = vi % 6u;          // índice do canto
                    let p      = particles[pi];

                    let offset = corners[ci] * p.r * 1.5; // escala pelo raio
                    var out: VSOut;
                    out.pos = vec4<f32>(p.x + offset.x, p.y + offset.y, 0.0, 1.0);
                    out.uv  = corners[ci];
                    out.rad = p.r;
                    return out;
                }

                @fragment
                fn fs(in: VSOut) -> @location(0) f32 {
                    let d2 = dot(in.uv, in.uv);
                    if (in.rad == 0.0) { return 0.0; }

                    // campo que decai com distância — soma dos vizinhos cria a ponte
                    let field = 1.0 / (d2 + 0.01);
                    return field;
                }
            `;

            const renderModule = device.createShaderModule({ code: renderShader });

            const fieldTexture = device.createTexture({
                size: [canvas.width * .5, canvas.height * .5],
                format: "r8unorm",           // canal único, ponto flutuante
                usage:
                    GPUTextureUsage.RENDER_ATTACHMENT |
                    GPUTextureUsage.TEXTURE_BINDING
            });

            const fieldPipeline = device.createRenderPipeline({
                layout: "auto",
                vertex:   { module: renderModule, entryPoint: "vs" },  // mesmo módulo do pass1
                fragment: {
                    module: renderModule, entryPoint: "fs",
                    targets: [{
                        format: "r8unorm",
                        blend: {
                            color: { srcFactor: "one", dstFactor: "one", operation: "add" },
                            alpha: { srcFactor: "one", dstFactor: "one", operation: "add" }
                        }
                    }]
                },
                primitive: { topology: "triangle-list" }
            });

            const thresholdShader = `
                @group(0) @binding(0) var fieldTex : texture_2d<f32>;
                @group(0) @binding(1) var s        : sampler;

                @vertex
                fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4<f32> {
                    let p = array<vec2<f32>,3>(
                        vec2(-1.0,-1.0), vec2(3.0,-1.0), vec2(-1.0, 3.0)
                    );
                    return vec4<f32>(p[i], 0.0, 1.0);
                }

                @fragment
                fn fs(@builtin(position) pos: vec4<f32>) -> @location(0) vec4<f32> {
                    let uv    = pos.xy / vec2<f32>(${canvas.width}.0, ${canvas.height}.0);
                    let field = textureSample(fieldTex, s, uv).r;
                    if (field < 1.0) { discard; }
                    return vec4<f32>(1.0, 1.0, 1.0, 1.0);
                }
            `;

            const thresholdModule   = device.createShaderModule({ code: thresholdShader });
            const thresholdPipeline = device.createRenderPipeline({
                layout: "auto",
                vertex:   { module: thresholdModule, entryPoint: "vs" },
                fragment: { module: thresholdModule, entryPoint: "fs", targets: [{ format }] },
                primitive: { topology: "triangle-list" }
            });

            
            const fieldView    = fieldTexture.createView();
            const fieldSampler = device.createSampler({ minFilter: "linear" });
            const fieldBindGroup = device.createBindGroup({
                layout: thresholdPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: fieldView    },
                    { binding: 1, resource: fieldSampler }
                ]
            });

            const fieldBG_A = device.createBindGroup({
                layout: fieldPipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: bufferA } }]
            });

            const fieldBG_B = device.createBindGroup({
                layout: fieldPipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: bufferB } }]
            });

            // Loop
            let frame = 0;
            let frameCount = 0;
            let lastTime = performance.now();

            function tick() {
                const now = performance.now();
                frameCount++;
                if (now - lastTime >= 1000) {
                    console.log(`FPS: ${frameCount}`);
                    frameCount = 0;
                    lastTime = now;
                }

                const isEven    = frame % 2 === 0;
                const insertBG  = isEven ? insertBG_A  : insertBG_B;
                const computeBG = isEven ? bindGroupAB : bindGroupBA;
                const fieldBG   = isEven ? fieldBG_B   : fieldBG_A;

                const encoder = device.createCommandEncoder();

                // 1. Zera o hash table (COPY_DST → clearBuffer é O(1) na GPU)
                encoder.clearBuffer(hashBuf);

                // 2. Insere as posições atuais no hash
                const iPass = encoder.beginComputePass();
                iPass.setPipeline(insertPipeline);
                iPass.setBindGroup(0, insertBG);
                iPass.dispatchWorkgroups(Math.ceil(objects / 64));
                iPass.end();

                // 3. Física O(N·k)
                const cPass = encoder.beginComputePass(
                    useTS ? { timestampWrites: {
                        querySet: qs,
                        beginningOfPassWriteIndex: 0,
                        endOfPassWriteIndex: 1
                    }} : undefined
                );
                cPass.setPipeline(computePipeline);
                cPass.setBindGroup(0, computeBG);
                cPass.dispatchWorkgroups(Math.ceil(objects / 64));
                cPass.end();

                // 4. Campo escalar → fieldTexture
                const rPass1 = encoder.beginRenderPass({
                    colorAttachments: [{
                        view: fieldView, clearValue: { r: 0, g: 0, b: 0, a: 0 },
                        loadOp: "clear", storeOp: "store"
                    }]
                });
                rPass1.setPipeline(fieldPipeline);
                rPass1.setBindGroup(0, fieldBG);
                rPass1.draw(6, objects);
                rPass1.end();

                // 5. Threshold → canvas
                const rPass2 = encoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        clearValue: { r: 0, g: 0, b: 0, a: 1 },
                        loadOp: "clear", storeOp: "store"
                    }]
                });
                rPass2.setPipeline(thresholdPipeline);
                rPass2.setBindGroup(0, fieldBindGroup);
                rPass2.draw(3);
                rPass2.end();

                if (useTS) encoder.resolveQuerySet(qs, 0, 2, qbuf, 0);
                device.queue.submit([encoder.finish()]);

                frame++;
                requestAnimationFrame(tick);
            }
            tick();
        }
        catch (e) {
            console.error("Erro: ", e);
        }

        //
        const bytes = arr.byteLength;
        const tamanhos = ['Bytes', 'KB', 'MB'];
        const n = Math.floor(Math.log(bytes) / Math.log(1024));
        const s = parseFloat((bytes / Math.pow(1024, n)).toFixed(2)) + ' ' + tamanhos[n];

        console.log(`Size [${objects}][${arr.length}]: ${s}`); // 64 ints | 1024 KBs
    </script>
</body>

</html>
